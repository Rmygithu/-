# Docker Compose 配置
# 一键启动 Breakup Recovery Squad

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: breakup-recovery
    ports:
      - "8501:8501"
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      - MIMO_MODEL_ID=${MIMO_MODEL_ID:-xiaomi/MiMo-7B-RL}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 数据卷说明：
# - ./data:/app/data 用于持久化数据（可选）

# 使用方法：
# 1. 复制 .env.example 为 .env 并填入配置
# 2. 运行 docker-compose up -d
# 3. 访问 http://localhost:8501
